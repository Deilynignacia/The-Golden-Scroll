<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Scroll - Registration</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/registration.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Fredoka:wght@700&display=swap" rel="stylesheet">
</head>
<body> 
<main>
    <div class="logo">
        <img src="images/logo.png" alt="logo">
    </div>

    <div class="role-selector">
        
    <button type="button" class="role-btn-circle" id="role-player">
        <div class="svg-container">
            <svg viewBox="0 0 250 170" class="curved-text-svg">
                <path id="curve-player" d="M 70, 85 a 55,55 0 1,1 110,0" fill="transparent" />
                <text>
                    <textPath xlink:href="#curve-player" startOffset="50%" text-anchor="middle">
                        PARTICIPANTE
                    </textPath>
                </text>
            </svg>
            <div class="role-icon player-icon"></div>
        </div>
    </button>

    <button type="button" class="role-btn-circle" id="role-monitor">
        <div class="svg-container">
            <svg viewBox="0 0 250 170" class="curved-text-svg">
                <path id="curve-monitor" d="M 70, 85 a 55,55 0 1,1 110,0" fill="transparent" />
                <text>
                    <textPath xlink:href="#curve-monitor" startOffset="50%" text-anchor="middle">
                        MONITOR
                    </textPath>
                </text>
            </svg>
            <div class="role-icon monitor-icon"></div>
        </div>
    </button>
        
    </div> <div id="registration-flow" style="display: none; width: 100%; flex-direction: column; align-items: center;">
        
        <div class="avatar-container">
            <div id="cat-avatar" class="cat-avatar"></div>
        </div>

        <div id="player-ui" style="width: 100%; display: none; flex-direction: column; align-items: center;">
            <input type="text" id="team-name" placeholder="NOMBRE DEL EQUIPO">
            <button id="btn-meet-cat">¡CONOCER A MI GATO!</button>
            
            <div class="profile-data">
                <div class="input-field">
                    <label for="chname">Tu Nombre:</label>
                    <input type="text" id="chname">
                </div>
                <div class="input-field">
                    <label for="coname">Tu Acompañante:</label>
                    <input type="text" id="coname">
                </div>
                <button type="button" id="btn-final-register">EMPEZAR AVENTURA</button>
            </div>
        </div>

        <div id="monitor-ui" style="width: 100%; display: none; flex-direction: column; align-items: center;">
            <div class="profile-data">
                <div class="input-field">
                    <label for="monitor-password">CONTRASEÑA:</label>
                    <input type="password" id="monitor-password" placeholder="Escribe aquí">
                </div>
                <button type="button" id="btn-unlock-monitor">DESBLOQUEAR PERFIL</button>
                <button type="button" id="btn-start-monitoring" style="display: none;">IR AL INICIO</button>
            </div>
        </div>
    </div>
</main>

    <script type="module" src="scripts/registration.mjs"></script>
    <script src="scripts/layout.js"></script>
</body>
</html>
