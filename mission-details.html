<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pergamino Dorado - Detalles de la Misión</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/mission-details.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Fredoka:wght@700&display=swap" rel="stylesheet">
</head>
<body> 
    <div id="header-container"></div>

    <main>
        <section id="mission-info" class="parchment">
            <button id="back-to-missions">⇦</button>
            
            <div class="mission-header">
                <img id="icon-dtl" src="" alt="Icono de Misión">
                <h1 id="title-dtl"></h1>
                <h2 id="subtitle-dtl"></h2> 
                <h3 id="difficulty-dtl"></h3>
            </div>

            <div class="mission-dtl">
                <p id="description"></p>
                
                <div class="mentor-note">
                    <p>⚠️ ¡Recuerda que solo tu Monitor puede desbloquear este pergamino después de que completes la tarea!</p>
                </div>
            </div>
        </section>
    </main>
    <div style="height: 10rem;"></div>

    <div id="footer-container"></div>

    <script type="module" src="scripts/layout.mjs"></script>
    <script type="module" src="scripts/index.mjs"></script>
    <script type="module" src="scripts/missionDetails.mjs"></script>
</body></html>
